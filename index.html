<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronos 十二时辰听雨 Widget</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            transition: background 1s ease;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .card {
            position: relative;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .time {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 10px;
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .shi-chen {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 20px;
            color: white;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        .poem {
            font-size: 16px;
            color: white;
            opacity: 0;
            transition: opacity 0.5s ease;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        .card:hover .poem {
            opacity: 0.7;
        }

        .rain-button {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .rain-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .rain-button::after {
            content: '💧';
            font-size: 14px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="card">
        <div class="time" id="time"></div>
        <div class="shi-chen" id="shi-chen"></div>
        <div class="poem" id="poem"></div>
        <div class="rain-button" id="rain-button"></div>
    </div>

    <script>
        // 时辰数据
        const shiChenData = [
            { start: 23, end: 1, color1: '#12040C', color2: '#1E293B', name: '子时', poem: '三更三点万家眠，露欲为霜月堕烟' },
            { start: 5, end: 7, color1: '#F6DCCE', color2: '#F4B8B8', name: '卯时', poem: '天际霞光入水中，水中天际一时红' },
            { start: 11, end: 13, color1: '#FBB929', color2: '#E6B422', name: '午时', poem: '午后恣情寝，午时随事餐' },
            { start: 17, end: 19, color1: '#63BB00', color2: '#648E93', name: '酉时', poem: '远岫出云催薄暮，细风吹雨弄轻阴' }
        ];

        // 获取当前时辰
        function getCurrentShiChen() {
            const now = new Date();
            const hour = now.getHours();
            
            for (const shiChen of shiChenData) {
                if (shiChen.start <= shiChen.end) {
                    if (hour >= shiChen.start && hour < shiChen.end) {
                        return shiChen;
                    }
                } else {
                    if (hour >= shiChen.start || hour < shiChen.end) {
                        return shiChen;
                    }
                }
            }
            
            // 默认返回一个基础颜色
            return { color1: '#333333', color2: '#666666', name: '时辰', poem: '' };
        }

        // 更新时间和时辰
        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('time').textContent = `${hours}:${minutes}:${seconds}`;
            
            const currentShiChen = getCurrentShiChen();
            document.getElementById('shi-chen').textContent = currentShiChen.name;
            document.getElementById('poem').textContent = currentShiChen.poem;
            
            // 设置背景渐变
            document.body.style.background = `linear-gradient(135deg, ${currentShiChen.color1}, ${currentShiChen.color2})`;
        }

        // 初始化Canvas雨滴效果
        let canvas, ctx, raindrops = [];
        let isRaining = false;
        
        function initCanvas() {
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d');
            
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            // 创建雨滴
            function createRaindrops() {
                raindrops = [];
                const count = Math.floor(window.innerWidth / 10);
                for (let i = 0; i < count; i++) {
                    raindrops.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        length: Math.random() * 10 + 5,
                        speed: Math.random() * 3 + 1,
                        opacity: Math.random() * 0.5 + 0.1
                    });
                }
            }
            
            createRaindrops();
            window.addEventListener('resize', createRaindrops);
            
            // 动画循环
            function animate() {
                if (!isRaining) return;
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                raindrops.forEach(raindrop => {
                    ctx.beginPath();
                    ctx.moveTo(raindrop.x, raindrop.y);
                    ctx.lineTo(raindrop.x, raindrop.y + raindrop.length);
                    ctx.strokeStyle = `rgba(255, 255, 255, ${raindrop.opacity})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    
                    raindrop.y += raindrop.speed;
                    
                    if (raindrop.y > canvas.height) {
                        raindrop.y = 0;
                        raindrop.x = Math.random() * canvas.width;
                    }
                });
                
                requestAnimationFrame(animate);
            }
            
            animate();
        }

        // 初始化Web Audio API雨声
        let audioContext, whiteNoise, filter, gainNode;
        let isPlaying = false;
        
        function initAudio() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            
            // 创建白噪音
            whiteNoise = audioContext.createBufferSource();
            const buffer = audioContext.createBuffer(1, audioContext.sampleRate * 2, audioContext.sampleRate);
            const output = buffer.getChannelData(0);
            for (let i = 0; i < buffer.length; i++) {
                output[i] = Math.random() * 2 - 1;
            }
            whiteNoise.buffer = buffer;
            whiteNoise.loop = true;
            
            // 创建低通滤波器
            filter = audioContext.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 1000;
            filter.Q.value = 1;
            
            // 创建增益节点
            gainNode = audioContext.createGain();
            gainNode.gain.value = 0.3;
            
            // 连接节点
            whiteNoise.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioContext.destination);
        }

        // 控制雨声
        function toggleRain() {
            if (!audioContext) {
                initAudio();
            }
            
            if (!isPlaying) {
                audioContext.resume();
                whiteNoise.start();
                isPlaying = true;
                isRaining = true;
                document.getElementById('canvas').style.opacity = '1';
            } else {
                whiteNoise.stop();
                isPlaying = false;
                isRaining = false;
                document.getElementById('canvas').style.opacity = '0';
                // 重新创建白噪音源，以便下次播放
                whiteNoise = audioContext.createBufferSource();
                const buffer = audioContext.createBuffer(1, audioContext.sampleRate * 2, audioContext.sampleRate);
                const output = buffer.getChannelData(0);
                for (let i = 0; i < buffer.length; i++) {
                    output[i] = Math.random() * 2 - 1;
                }
                whiteNoise.buffer = buffer;
                whiteNoise.loop = true;
                whiteNoise.connect(filter);
            }
        }

        // 初始化
        function init() {
            updateTime();
            setInterval(updateTime, 1000);
            initCanvas();
            
            // 绑定按钮事件
            document.getElementById('rain-button').addEventListener('click', toggleRain);
        }

        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
