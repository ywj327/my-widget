<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>十二时辰节律数字疗愈 Widget</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&family=Noto+Sans+SC:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --transition-speed: 3000ms;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            transition: background var(--transition-speed) ease-in-out;
            background: linear-gradient(135deg, #161D29, #1E293B);
            min-height: 100vh;
            overflow: hidden;
        }

        #app {
            min-height: 100vh;
            min-width: 100vw;
            transition: background var(--transition-speed) ease-in-out;
        }

        .glass-card {
            backdrop-filter: blur(2xl);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            transition: all var(--transition-speed) ease-in-out;
        }

        .shichen {
            font-family: 'Noto Serif SC', serif;
            letter-spacing: 0.25em;
        }

        .poetry {
            font-family: 'Noto Serif SC', serif;
            transition: opacity 700ms ease-in-out;
        }
    </style>
</head>
<body>
    <div id="app" class="flex items-center justify-center min-h-screen min-w-screen bg-gradient-to-br from-[#161D29] to-[#1E293B]">
        <div id="glass-card" class="group relative glass-card max-w-sm w-full p-12 mx-4 flex flex-col items-center">
            <div id="digital-time" class="time text-xs font-light text-white/60 mb-8 tracking-tight">14:30</div>
            <div id="time-period" class="shichen text-4xl font-light text-white mb-8">午未 · 慵懒</div>
            <div id="poetry" class="poetry opacity-0 group-hover:opacity-100 text-xs text-white/70 tracking-wide">日正南冈下饷归，可怜朝雉扰惊飞</div>
        </div>
    </div>

    <script>
        // 十二时辰数据映射表
        const timeData = [
            { start: 23, end: 3, color1: '#161D29', color2: '#1E293B', period: '子丑 · 宁静', poetry: '三更三点万家眠，露欲为霜月堕烟' },
            { start: 3, end: 7, color1: '#D69C9C', color2: '#F4B8B8', period: '寅卯 · 破晓', poetry: '天际霞光入水中，水中天际一时红' },
            { start: 7, end: 11, color1: '#9ECCAB', color2: '#C8DEC9', period: '辰巳 · 生机', poetry: '村村早食争挑菜，处处春耕乐饭牛' },
            { start: 11, end: 15, color1: '#C29615', color2: '#E6B422', period: '午未 · 慵懒', poetry: '日正南冈下饷归，可怜朝雉扰惊飞' },
            { start: 15, end: 19, color1: '#4B8E8D', color2: '#648E93', period: '申酉 · 沉淀', poetry: '远岫出云催薄暮，细风吹雨弄轻阴' },
            { start: 19, end: 23, color1: '#2C3033', color2: '#1A1A1A', period: '戌亥 · 敛藏', poetry: '茅檐人静蓬窗暗，春晚连江风雨时' }
        ];

        // 获取当前时间并更新状态
        function updateTimeStatus() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const digitalTime = `${hours}:${minutes}`;

            // 找到对应的时辰数据
            let currentTimeData;
            if (hours >= 23 || hours < 3) {
                currentTimeData = timeData[0];
            } else if (hours >= 3 && hours < 7) {
                currentTimeData = timeData[1];
            } else if (hours >= 7 && hours < 11) {
                currentTimeData = timeData[2];
            } else if (hours >= 11 && hours < 15) {
                currentTimeData = timeData[3];
            } else if (hours >= 15 && hours < 19) {
                currentTimeData = timeData[4];
            } else {
                currentTimeData = timeData[5];
            }

            // 更新背景渐变色
            const app = document.getElementById('app');
            app.style.background = `linear-gradient(135deg, ${currentTimeData.color1}, ${currentTimeData.color2})`;

            // 更新卡片内容
            document.getElementById('digital-time').textContent = digitalTime;
            document.getElementById('time-period').textContent = currentTimeData.period;
            document.getElementById('poetry').textContent = currentTimeData.poetry;
        }

        // 初始化并设置定时器
        updateTimeStatus();
        setInterval(updateTimeStatus, 60000); // 每分钟更新一次
    </script>
</body>
</html>
